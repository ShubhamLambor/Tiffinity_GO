name: deliveryui
description: "Tiffinity Delivery Partner App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  firebase_auth: ^6.1.3
  firebase_core: ^4.3.0
  geolocator: ^13.0.1
  permission_handler: ^12.0.1
  url_launcher: ^6.2.0
  flutter_osm_plugin: ^1.4.3
  path_provider: ^2.1.2
  path: ^1.9.0
  image: ^4.1.7
  lottie: ^3.0.0  # for animations
  get: ^4.6.6
  slide_to_act: ^2.0.1
  latlong2: ^0.9.0
  cached_network_image: ^3.3.1


dev_dependencies:
  flutter_native_splash: ^2.3.5
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Add assets folder
  assets:
    - assets/icon/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/delivery_icon.png"
  ios_content_padding: 2
  background_color_ios: "#FFFFFF"
  min_sdk_android: 21

  # Adaptive icon for better Android appearance
  adaptive_icon_background: "#FFFFFF"  # Changed to White background
  adaptive_icon_foreground: "assets/icon/delivery_icon.png"

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#FFFFFF"  # Changed to White background
  image: assets/icon/delivery_icon.png

# Android Splash Screen Configuration
android_splash:
  android: true
  ios: true

  # Android 12+ specific splash
  android_12:
    color: "#FFFFFF"
    image: assets/icon/delivery_icon.png

  # iOS specific
  ios_content_mode: center

  # Web support (optional)
  web: false
